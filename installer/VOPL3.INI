; VOPL3 renderer settings (read by VOPLSRV.EXE at startup)
[renderer]
; FM output volume, in percent. 100 = the OPL3 chip's native digital level
; (authentic, but quiet next to SBEMUL's digital sound ). 200 = double (+6 dB,
; the default). Maximum 400. Very high values may clip on loud music.
; Change takes effect the next time VOPLSRV.EXE starts (e.g. after reboot or
; when manually restarting VOPLSRV.EXE).
volume=200

[midi]
; MPU-401 MIDI output device for DOS-game General MIDI.
; 65535 = Windows MIDI Mapper (default) - routes to whatever synth/device you
;         select in Control Panel > Multimedia > MIDI.
; 0,1,2,... = a specific midiOut device index instead of the Mapper.
device=65535
